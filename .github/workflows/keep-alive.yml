name: Keep-alive and refresh

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  trigger-collect:
    runs-on: ubuntu-latest
    steps:
      - name: Wake service and trigger a match collection
        # X-Ops-Token authenticates operational endpoints when the site is
        # private (OPS_TOKEN set in Render + as a GitHub secret). Harmless
        # empty header when the site is open.
        run: |
          curl -sf -X POST -H "X-Ops-Token: ${{ secrets.OPS_TOKEN }}" "${{ vars.APP_URL }}/api/collect" \
            && echo "Triggered" \
            || echo "Request failed (service may already be collecting, or still waking up) - not fatal"

  # Render's free-tier disk is wiped on every redeploy, and substitution
  # history / queue positions exist ONLY in the app's database (mixer-cup
  # deletes its own history, and queue positions were captured from our
  # snapshots). This job saves that state to the data-backup branch, from
  # which the collector restores it after a wipe. Pushes to data-backup do
  # NOT trigger a Render deploy (Render only watches master).
  backup-state:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch state from the app
        id: fetch
        run: |
          if curl -sf -H "X-Ops-Token: ${{ secrets.OPS_TOKEN }}" "${{ vars.APP_URL }}/api/backup" -o backup.json; then
            python3 -c "import json; d = json.load(open('backup.json')); assert isinstance(d.get('substitution_events'), list)"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "App unreachable; skipping backup this round (not fatal)"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch per-tournament player-hero archive
        id: archive
        if: steps.fetch.outputs.ok == 'true'
        run: |
          # Saved under a league-specific filename, so when the next
          # tournament starts (new league id) the previous tournament's
          # archive keeps existing in the branch as reference data.
          if curl -sf -H "X-Ops-Token: ${{ secrets.OPS_TOKEN }}" "${{ vars.APP_URL }}/api/archive/player-heroes" -o archive.json; then
            # Key by mixer tournament id (league is shared across tournaments).
            KEY=$(python3 -c "import json; d=json.load(open('archive.json')); print(d.get('mixer_tournament_id') or d.get('league_id'))")
            echo "file=player-heroes-${KEY}.json" >> "$GITHUB_OUTPUT"
          else
            echo "Archive endpoint unreachable; skipping (not fatal)"
            echo "file=" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit to data-backup branch if changed
        if: steps.fetch.outputs.ok == 'true'
        run: |
          set -e
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if git clone --depth 1 --branch data-backup "$REPO_URL" repo 2>/dev/null; then
            :
          else
            git clone --depth 1 "$REPO_URL" repo
            cd repo
            git checkout --orphan data-backup
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi
          cp backup.json repo/backup.json
          if [ -n "${{ steps.archive.outputs.file }}" ]; then
            cp archive.json "repo/${{ steps.archive.outputs.file }}"
          fi
          cd repo
          git config user.name "state-backup"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes since last backup"
          else
            git commit -m "State backup $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin data-backup
          fi
