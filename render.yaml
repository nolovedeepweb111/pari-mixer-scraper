services:
  - type: web
    name: pari-mixer-scraper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 600 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: STEAM_API_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7
