<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PARI Mixer Cup — статистика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>PARI Mixer Cup</h1>
  <div class="header-actions">
    <button id="tournament-stats-btn">Статистика по героям</button>
    <button id="all-subs-btn">Замены</button>
    <a class="header-link-btn" href="https://battlepass.ru/service/steam" target="_blank" rel="noopener noreferrer">Пополнить Steam</a>
    <span id="collect-status"></span>
  </div>
</header>
<main>
  <aside>
    <h2>Команды</h2>
    <div id="teams"></div>
  </aside>
  <section id="team-detail">
    <p class="hint">Выберите команду слева</p>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
